# Verifies if a pull request has at least one label from a set of valid
# labels before it can be merged.

name: PR label checks

on:
  pull_request_target:
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  pull-requests: read

jobs:
  require-label:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required labels
        run: |
          echo "Current PR labels: ${{ toJson(github.event.pull_request.labels.*.name) }}"
          VALID_LABELS=(
            "[maintainer] release"
            "[scope] bug"
            "[scope] documentation"
            "[scope] enhancement"
            "[scope] maintenance"
            "[scope] significant"
          )

          found=false
          for label in "${VALID_LABELS[@]}"; do
            if echo "${{ toJson(github.event.pull_request.labels.*.name) }}" | grep -q "\"$label\""; then
              echo "Found valid label: $label"
              found=true
              break
            fi
          done

          if [ "$found" = false ]; then
            echo "::error::PR must have at least one of: ${VALID_LABELS[*]}"
            exit 1
          fi
