name: Test code and package

on:
  # Trigger the workflow on push
  push:
    # Every branch
    branches: ['**']
    # But do not run this workflow on creating a new tag starting with
    # 'v', e.g. 'v1.0.3' (see publish-pypi.yml)
    tags-ignore: ['v*']
  # Trigger the workflow on pull request
  pull_request:
    branches: ['**']
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent workflow, skipping runs queued between the run
# in-progress and latest queued. And cancel in-progress runs.
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Set the environment variables to be used in all jobs defined in this workflow
env:
  CI_BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  # Job 1: Test code
  test-source:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: '0' # full history with tags to get the version number by versioningit

      - name: Set up pixi (incl. environments and dependencies)
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          environments: default
          activate-environment: default
          run-install: true
          frozen: true
          cache: false
          post-cleanup: false

      - name: Run unit tests
        shell: bash
        run: pixi run tests

      # Delete all local tags when not on a tagged commit to force versioningit
      # to fall back to the configured default-tag, which is '999.0.0' in our case.
      # This is needed for testing the package in the next job, as its version
      # must be higher than the PyPI version for pip to prefer the local version.
      - name: Force using versioningit default tag (non tagged release)
        if: startsWith(github.ref , 'refs/tags/v') != true
        run: git tag --delete $(git tag)

      - name: Create Python package
        shell: bash
        run: pixi run dist-build

      - name: Remove badgery editable install (for the next job)
        shell: bash
        run: pixi remove badgery --pypi

      # More than one file/dir need to be specified in 'path', to preserve the
      # structure of the dist/ directory, not only its contents.
      - name: Upload Python package for the next job
        uses: actions/upload-artifact@v4
        with:
          name: edl_${{ matrix.os }}_${{ runner.arch }}
          path: |
            dist/
            tests/
            pixi.toml
          if-no-files-found: 'error'
          compression-level: 0

  # Job 2: Test the package
  test-package:
    needs: [test-source] # depend on previous job

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name:
          Download zipped Python package (incl. extra files) from previous job
        uses: actions/download-artifact@v4
        with: # name or path are taken from the upload step of the previous job
          name: edl_${{ matrix.os }}_${{ runner.arch }}
          path: . # directory to extract downloaded zipped artifacts

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          environments: wheel
          activate-environment: wheel
          run-install: true
          cache: false
          post-cleanup: false

      - name: Add package from the built wheel
        shell: bash
        run: |
          echo "📦 Looking for wheel in dist/"
          whl_path="$(python3 -c "import pathlib; w = sorted(pathlib.Path('dist').glob('*.whl')); print(w[0].resolve().as_uri())")"
          echo "📦 Adding package from: $whl_path"
          pixi add --pypi "badgery[dev] @ $whl_path"

      - name: Run unit tests
        shell: bash
        run: pixi run tests

  # Job 3: Trigger dashboard build
  trigger-dashboard-build:
    needs: [test-source, test-package] # depend on previous jobs

    runs-on: ubuntu-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v5

      - name: Trigger dashboard build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "dashboard.yaml",
              ref: "${{ env.CI_BRANCH }}"
            });