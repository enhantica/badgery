# This workflow creates an automated release PR from `develop` into `main`.
#
# Usage:
#   - Triggered manually via workflow_dispatch.
#   - Creates a PR titled "Release: merge develop into master".
#   - Adds the label "[maintainer] release" so it is excluded from changelogs.
#   - The PR body makes clear that this is automation only (no review needed).

name: Release PR creation

on:
  workflow_dispatch: # manual trigger only

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v5
        with:
          ref: develop

      - name: Create PR from develop to main
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "Release: merge develop into main" \
            --label "[maintainer] auto-pull-request" \
            --body "This pull request is created automatically to trigger the release pipeline. It merges the accumulated changes from \`develop\` into \`main\`.

            ⚠️ Note: This PR is labeled \`[maintainer] auto-pull-request\` and is excluded from release notes and version bump logic."
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_PERSONAL_ACCSESS_TOKEN }}
